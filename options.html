<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BulletPages - API Key</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="options">
        <h1>BulletPages</h1>
        
        <div class="api-key-description">
            Get your Gemini API key from https://aistudio.google.com/
        </div>
        
        <input type="password" id="gemini-api-key-input" placeholder="Enter your Gemini API key...">
        
        <button id="save-api-key">Save Key</button>
        <a href="popup.html">
            <button id="back-to-popup">Back</button>
        </a>
        
        <div id="status-message"></div>
    </div>
    
    <script src="options.js"></script>
</body>
</html>
